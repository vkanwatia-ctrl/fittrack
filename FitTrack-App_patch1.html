<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f0f">
<title>FitTrack</title>
<style>
:root{--bg:#0d0f0f;--bg2:#141717;--bg3:#1a1e1e;--card:#1e2424;--border:#2a3030;--green:#4ade80;--orange:#fb923c;--blue:#60a5fa;--yellow:#fbbf24;--red:#f87171;--text:#e8edec;--muted:#8a9e9a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.5}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{flex-shrink:0;padding:env(safe-area-inset-top) 16px 10px;padding-top:calc(env(safe-area-inset-top)+14px);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.hdr-brand{font-size:20px;font-weight:800;color:var(--green);letter-spacing:-0.5px}
.hdr-date{font-size:12px;color:var(--muted)}
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.bnav{flex-shrink:0;position:fixed;bottom:0;left:0;right:0;height:calc(58px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:7.5px;font-weight:700;letter-spacing:.04em;transition:color .15s;padding:0}
.ni.active{color:var(--green)}
.ni svg{width:18px;height:18px}
.pg{display:none;padding:16px;min-height:100%}.pg.active{display:block}

/* Section headers */
.sh{display:flex;align-items:baseline;justify-content:space-between;margin:20px 0 10px}
.sh:first-child{margin-top:0}
.sh-title{font-size:17px;font-weight:700;letter-spacing:-.4px}
.sh-btn{font-size:12px;color:var(--green);background:none;border:none;cursor:pointer;font-weight:600;padding:0}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.cb{padding:14px 16px}

/* Pills */
.pill{padding:2px 8px;border-radius:100px;font-size:10.5px;font-weight:600;letter-spacing:.02em;white-space:nowrap;display:inline-block}
.pill-g{background:rgba(74,222,128,.14);color:var(--green)}
.po{background:rgba(251,146,60,.14);color:var(--orange)}
.pb{background:rgba(96,165,250,.14);color:var(--blue)}
.py{background:rgba(251,191,36,.14);color:var(--yellow)}
.pm{background:rgba(255,255,255,.07);color:var(--muted)}

/* Stats */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sg4{grid-template-columns:repeat(4,1fr)}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.sv{font-size:24px;font-weight:800;line-height:1;margin-bottom:3px;color:var(--green)}
.sv.o{color:var(--orange)}
.sv.b{color:var(--blue)}
.sl{font-size:11px;color:var(--muted)}

/* Today banner */
.tbanner{background:linear-gradient(135deg,rgba(74,222,128,.11),rgba(74,222,128,.03));border:1px solid rgba(74,222,128,.2);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer}
.tt{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.tn{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.td{font-size:13px;color:var(--muted);margin-bottom:10px}
.ttags{display:flex;gap:6px;flex-wrap:wrap}

/* Day tabs */
.dtabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:14px}
.dtabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;padding:8px 11px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;min-width:44px}
.dtab span{font-size:14px;display:block;margin-bottom:2px}
.dtab.active{background:var(--green);border-color:var(--green);color:#0d1210}
.dtab.td2{border-color:rgba(74,222,128,.35);color:var(--green)}
.dtab.active{color:#0d1210}

/* Exercise card */
.exc{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.ext{display:flex;align-items:stretch;border-bottom:1px solid var(--border)}
.esvg{width:108px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;padding:10px;border-right:1px solid var(--border)}
.esvg svg{width:88px;height:auto}
.emeta{flex:1;padding:11px 12px;display:flex;flex-direction:column;gap:5px;min-width:0}
.ename{font-weight:700;font-size:14px;line-height:1.25}
.emuscles{font-size:11px;color:var(--muted)}
.etags{display:flex;gap:5px;flex-wrap:wrap}
.eequip{font-size:11px;color:var(--blue);display:flex;align-items:center;gap:3px}

/* Set logger */
.elog{padding:10px 12px 12px}
.prevref{font-size:11px;color:var(--muted);padding:3px 0 8px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:6px;display:flex;gap:4px}
.srow{display:flex;align-items:center;gap:7px;padding:4px 0}
.snum{font-size:10px;color:var(--muted);width:22px;text-align:center;font-weight:700}
.sw{flex:1}
.sinp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 4px;color:var(--text);font-size:14px;font-weight:700;text-align:center;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.sinp:focus{border-color:var(--green)}
.slbl{font-size:9px;color:var(--muted);text-align:center;margin-top:2px}
.sx{font-size:11px;color:var(--muted)}
.doneBtn{width:30px;height:30px;flex-shrink:0;border-radius:50%;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.doneBtn.done{background:var(--green);border-color:var(--green);color:#0d1210}
.addset{width:100%;margin-top:8px;padding:7px;background:rgba(74,222,128,.06);border:1px dashed rgba(74,222,128,.22);border-radius:8px;color:var(--green);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}

/* Run */
.rentry{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.rentry:last-child{border-bottom:none}
.rico{width:38px;height:38px;border-radius:10px;background:rgba(74,222,128,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rico.g{background:rgba(96,165,250,.1)}
.rinfo{flex:1;min-width:0}
.rname{font-weight:600;font-size:13px}
.rmeta{font-size:11px;color:var(--muted);margin-top:1px}
.rstats{text-align:right;flex-shrink:0}
.rdist{font-weight:800;font-size:16px;color:var(--green)}
.rpace{font-size:11px;color:var(--muted)}

/* Garmin bar */
.gbar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg3);border-radius:12px;border:1px solid var(--border);margin-bottom:10px}
.gdot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.gdot.on{background:var(--green);box-shadow:0 0 8px rgba(74,222,128,.5)}
.gdot.spin{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Progress */
.prow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.prow:last-child{border-bottom:none}
.pico{width:36px;height:36px;border-radius:10px;background:rgba(251,146,60,.1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.pinfo{flex:1}
.pname{font-weight:600;font-size:13px}
.pmuscles{font-size:11px;color:var(--muted);margin-top:1px}
.pval{text-align:right;flex-shrink:0}
.pw{font-size:20px;font-weight:800;color:var(--orange)}
.psub{font-size:11px;color:var(--muted)}

/* Settings */
.srow2{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.srow2:last-child{border-bottom:none}
.slabel{font-weight:500;font-size:14px}
.ssub{font-size:11px;color:var(--muted);margin-top:2px}

/* Overlay / sheet */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.ovl.open{opacity:1;pointer-events:all}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border);width:100%;padding:16px 16px calc(24px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .3s cubic-bezier(.32,1.25,.64,1);max-height:90dvh;overflow-y:auto}
.ovl.open .sheet{transform:translateY(0)}
.hdl{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.stitle{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px}

/* Forms */
.fg{margin-bottom:12px}
.fl{font-size:11.5px;color:var(--muted);margin-bottom:5px;display:block;font-weight:500}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;font-family:inherit;-webkit-appearance:none;appearance:none}
.fi:focus{border-color:var(--green)}
select.fi option{background:var(--bg3)}
.frow{display:flex;gap:10px}
.frow .fg{flex:1}

/* Buttons */
.btn{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:transform .1s,opacity .1s;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;letter-spacing:-.1px}
.btn:active{transform:scale(.97)}
.btnP{background:var(--green);color:#0d1210}
.btnS{background:rgba(255,255,255,.08);color:var(--text)}
.btnD{background:rgba(248,113,113,.12);color:var(--red)}
.btnW{width:100%}
.btns{display:flex;gap:8px;margin-top:4px}

/* Weight history */
.wentry{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.wentry:last-child{border-bottom:none}
.wleft{display:flex;flex-direction:column;gap:2px}
.wval{font-size:17px;font-weight:700}
.wdate{font-size:11px;color:var(--muted)}
.wchg{font-size:12px;font-weight:600}
.wchg.up{color:var(--red)}
.wchg.dn{color:var(--green)}
.wdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;opacity:.45;transition:opacity .15s}
.wdel:hover,.wdel:active{opacity:1;color:var(--red)}

/* Toast */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:8px 18px;font-size:13px;font-weight:500;opacity:0;transition:all .22s;pointer-events:none;z-index:500;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.35);color:var(--green)}
.toast.err{border-color:rgba(248,113,113,.35);color:var(--red)}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.eico{font-size:40px;margin-bottom:12px}
.etxt{font-size:13px;line-height:1.7;margin-bottom:16px}

/* Phase card */
.phase-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.ph-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.ph-name{font-weight:700;font-size:14px}
.ph-weeks{font-size:11px;color:var(--muted);font-family:monospace}
.ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ph-s{background:rgba(255,255,255,.04);border-radius:8px;padding:8px}
.ph-sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.ph-sv{font-size:13px;font-weight:700;color:var(--text);font-family:monospace}

/* Macro bar */
.mrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mrow:last-child{border-bottom:none}
.mlbl{width:72px;font-size:12.5px;color:var(--muted)}
.mbw{flex:1;height:8px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
.mbar{height:100%;border-radius:100px}
.mval{width:80px;text-align:right;font-size:12px;font-weight:700;font-family:monospace}

canvas{display:block;width:100%}

/* ── WEEKLY SUMMARY STRIP ── */
.wk-strip{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.wk-strip-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.wk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.wk-col{text-align:center;background:var(--bg3);border-radius:8px;padding:8px 4px}
.wk-val{font-size:18px;font-weight:800;line-height:1}
.wk-sub{font-size:8.5px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}

/* ── HISTORY BUTTON ── */
.hist-btn{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);border-radius:8px;color:var(--blue);cursor:pointer;font-size:10px;padding:3px 8px;font-weight:700;white-space:nowrap;font-family:inherit}
.hist-btn:active{opacity:.7}

/* ── 1RM BADGE ── */
.onerm-tag{background:rgba(251,191,36,.1);color:var(--yellow);padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;display:inline-block}

/* ── PPL SPLIT PICKER ── */
.split-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.split-card{border-radius:12px;border:1.5px solid var(--border);background:var(--card);padding:13px 12px;cursor:pointer;transition:all .15s;text-align:center}
.split-card:active{transform:scale(.97)}
.split-card.selected{border-width:2px}
.split-icon{font-size:24px;margin-bottom:5px}
.split-label{font-size:14px;font-weight:800;letter-spacing:-.3px;margin-bottom:2px}
.split-desc{font-size:10.5px;color:var(--muted);line-height:1.4}

/* ── LOGGED SESSION PILL on day view ── */
.session-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;margin:3px 3px 3px 0;cursor:pointer}
.session-tag:active{opacity:.7}
.no-session-hint{font-size:12.5px;color:var(--muted);padding:14px 0 6px;text-align:center}

/* ── EXERCISE HISTORY SHEET ── */
.hist-session{background:var(--bg3);border-radius:10px;padding:10px 12px;margin-bottom:7px}
.set-chip{background:rgba(255,255,255,.05);border-radius:6px;padding:4px 9px;font-size:11px;font-family:monospace;display:inline-block;margin:2px}

/* ── PROGRESS PAGE ── */
.pr-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .12s}
.pr-row:last-child{border-bottom:none}
.pr-row:active{background:rgba(255,255,255,.03)}
.pr-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.pr-info{flex:1;min-width:0}
.pr-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.pr-right{text-align:right;flex-shrink:0}
.pr-weight{font-size:19px;font-weight:800;color:var(--orange);line-height:1}
.pr-1rm{font-size:10.5px;color:var(--yellow);font-weight:600;margin-top:2px}
.heatmap-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:4px}
.hm-cell{border-radius:10px;padding:9px 5px;text-align:center;border:1px solid var(--border);transition:transform .15s}
.hm-cell:active{transform:scale(.95)}
.hm-icon{font-size:18px;margin-bottom:3px}
.hm-label{font-size:8.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.hm-count{font-size:11px;font-weight:800;margin-top:2px}
.chart-tabs{display:flex;gap:6px;margin-bottom:10px}
.chart-tab{padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.chart-tab.active{background:var(--blue);border-color:var(--blue);color:#0d1210}
.chart-legend{display:flex;gap:12px;padding:4px 14px 10px;flex-wrap:wrap}
.legend-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}

/* ── AI COACH PAGE ── */
.coach-hero{background:linear-gradient(135deg,rgba(96,165,250,.13),rgba(74,222,128,.07));border:1px solid rgba(96,165,250,.25);border-radius:16px;padding:18px;margin-bottom:12px;text-align:center}
.coach-hero-icon{font-size:38px;margin-bottom:8px}
.coach-hero-title{font-size:19px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
.coach-hero-sub{font-size:12.5px;color:var(--muted);line-height:1.6}
.coach-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.1px;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.coach-btn:active{opacity:.85}
.coach-btn:disabled{opacity:.5;cursor:not-allowed}
.coach-loading{text-align:center;padding:32px 20px}
.coach-dots{display:flex;justify-content:center;gap:7px;margin-top:14px}
.coach-dot{width:9px;height:9px;border-radius:50%;background:var(--blue);animation:coachPulse 1.2s infinite}
.coach-dot:nth-child(2){animation-delay:.2s}
.coach-dot:nth-child(3){animation-delay:.4s}
@keyframes coachPulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.coach-section{margin-bottom:14px}
.coach-section-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.coach-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.coach-card p{font-size:13.5px;line-height:1.75;color:var(--text);margin:0}
.coach-tip{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.coach-tip:last-child{border-bottom:none}
.coach-tip-num{width:22px;height:22px;border-radius:50%;background:rgba(96,165,250,.15);color:var(--blue);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.coach-tip-text{flex:1;font-size:13px;line-height:1.7;color:var(--text)}
.coach-focus-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.coach-focus-item{background:var(--bg3);border-radius:10px;padding:11px 12px;border:1px solid var(--border)}
.coach-focus-label{font-size:9.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.coach-focus-val{font-size:13px;font-weight:600;line-height:1.45}
.coach-warning{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:11px 13px;font-size:12.5px;color:var(--text);line-height:1.65;display:flex;gap:9px;align-items:flex-start}
.coach-meta{text-align:center;padding:12px 0 4px;font-size:11px;color:var(--muted)}

/* ── DIET ── */
.meal-type-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.meal-type-tabs::-webkit-scrollbar{display:none}
.mtt{flex-shrink:0;padding:7px 14px;border-radius:100px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.mtt.active{background:var(--green);border-color:var(--green);color:#0d1210}

.meal-block{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.meal-block-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.03)}
.meal-time-label{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.1em}
.meal-kcal-badge{font-size:10.5px;font-weight:700;color:var(--muted);font-family:monospace}
.meal-item{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);gap:10px}
.meal-item:last-child{border-bottom:none}
.meal-item-left{flex:1;min-width:0}
.meal-item-name{font-weight:600;font-size:13.5px;line-height:1.3}
.meal-item-desc{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4}
.meal-item-macros{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.macro-chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;font-family:monospace}
.mc-p{background:rgba(74,222,128,.12);color:var(--green)}
.mc-c{background:rgba(96,165,250,.12);color:var(--blue)}
.mc-f{background:rgba(251,146,60,.12);color:var(--orange)}
.meal-log-btn{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.meal-log-btn.logged{background:var(--green);border-color:var(--green);color:#0d1210}

.macro-summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.msb-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.msb-val{font-size:17px;font-weight:800;line-height:1;color:var(--green)}
.msb-val.o{color:var(--orange)}
.msb-val.b{color:var(--blue)}
.msb-val.y{color:var(--yellow)}
.msb-label{font-size:9.5px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}

.calorie-ring-wrap{display:flex;align-items:center;justify-content:center;gap:20px;padding:14px 16px}
.cring{position:relative;width:88px;height:88px;flex-shrink:0}
.cring svg{width:88px;height:88px;transform:rotate(-90deg)}
.cring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.cring-num{font-size:18px;font-weight:800;color:var(--text);line-height:1}
.cring-sub{font-size:9px;color:var(--muted);margin-top:1px}
.cring-bars{flex:1}
.cbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cbar-row:last-child{margin-bottom:0}
.cbar-lbl{font-size:11px;color:var(--muted);width:48px;flex-shrink:0}
.cbar-track{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
.cbar-fill{height:100%;border-radius:100px;transition:width .4s ease}
.cbar-val{font-size:11px;font-weight:700;font-family:monospace;width:42px;text-align:right;flex-shrink:0}

/* Grocery List */
.groc-cat{margin-bottom:16px}
.groc-cat-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.groc-cat-icon{font-size:18px}
.groc-cat-name{font-weight:700;font-size:14px}
.groc-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.groc-item:last-child{border-bottom:none}
.groc-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.groc-check.checked{background:var(--green);border-color:var(--green);color:#0d1210}
.groc-name{flex:1;font-size:13px;font-weight:500;transition:opacity .2s}
.groc-name.checked{opacity:.4;text-decoration:line-through}
.groc-qty{font-size:11.5px;color:var(--muted);font-family:monospace;flex-shrink:0}
.groc-progress{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(74,222,128,.06);border-top:1px solid rgba(74,222,128,.12)}
.groc-prog-bar{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
.groc-prog-fill{height:100%;background:var(--green);border-radius:100px;transition:width .3s}
.groc-prog-txt{font-size:11px;font-weight:700;color:var(--green);font-family:monospace;flex-shrink:0}
</style>
</head>

const MUSCLE_MAP={
  chest:     ['bench-press','cable-fly','incline-press'],
  back:      ['bent-row','pullups','db-row','cable-row'],
  shoulders: ['ohp','face-pulls','lateral-raise'],

};

function calc1RM(w,r){
  if(!w||!r||r<=0)return 0;
  if(r===1)return Math.round(w);
  return Math.round(parseFloat(w)*(1+parseInt(r)/30));
}

async function getThisWeekStats(){
  const now=new Date();
  const dow=now.getDay()===0?6:now.getDay()-1;
  const startOfWeek=new Date(now);
  startOfWeek.setDate(now.getDate()-dow);startOfWeek.setHours(0,0,0,0);
  const wlogs=await dbAll('wLogs');
  const thisWeek=wlogs.filter(l=>new Date(l.date+'T00:00:00')>=startOfWeek);
  const sessions=new Set(thisWeek.map(l=>l.date)).size;
  let totalSets=0,volume=0;
  const musclesSet=new Set();
  for(const log of thisWeek){
    for(const s of(log.sets||[])){
      if(s.done&&s.w&&s.r){totalSets++;volume+=parseFloat(s.w)*parseInt(s.r)}
    }
    for(const[m,exs] of Object.entries(MUSCLE_MAP)){
      if(exs.includes(log.ex))musclesSet.add(m);
    }
  }
  return{sessions,totalSets,volume:Math.round(volume),musclesHit:musclesSet.size};
}

async function getExerciseHistory(key){
  const all=(await dbAll('wLogs','ex',key)).sort((a,b)=>a.date.localeCompare(b.date));
  return all.map(log=>{
    const valid=(log.sets||[]).filter(s=>s.w&&s.r);
    const best=valid.reduce((b,s)=>(!b||parseFloat(s.w)>parseFloat(b.w)?s:b),null);
    const oneRM=best?calc1RM(best.w,best.r):0;
    const totalVol=valid.reduce((sum,s)=>sum+parseFloat(s.w)*parseInt(s.r),0);
    return{date:log.date,sets:log.sets,best,oneRM,totalVol:Math.round(totalVol)};
  });
}

let DB;
function initDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('FitTrack',4);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('wLogs')){const s=d.createObjectStore('wLogs',{keyPath:'id',autoIncrement:true});s.createIndex('date','date');s.createIndex('ex','ex')}
      if(!d.objectStoreNames.contains('rLogs')){const s=d.createObjectStore('rLogs',{keyPath:'id',autoIncrement:true});s.createIndex('date','date')}
      if(!d.objectStoreNames.contains('bwt')){const s=d.createObjectStore('bwt',{keyPath:'id',autoIncrement:true});s.createIndex('date','date')}
      if(!d.objectStoreNames.contains('cfg')){d.createObjectStore('cfg',{keyPath:'key'})}
      if(!d.objectStoreNames.contains('mealLogs')){const s=d.createObjectStore('mealLogs',{keyPath:'id',autoIncrement:true});s.createIndex('date','date')}
      if(!d.objectStoreNames.contains('groceries')){d.createObjectStore('groceries',{keyPath:'key'})}
    };
    r.onsuccess=e=>{DB=e.target.result;res()};
    r.onerror=rej;
  });
}
function tx(s,m='readonly'){return DB.transaction(s,m).objectStore(s)}
function dbGet(s,k){return new Promise(r=>{const q=tx(s).get(k);q.onsuccess=e=>r(e.target.result)})}
function dbAll(s,idx,q){return new Promise(r=>{const st=tx(s);const req=idx?st.index(idx).getAll(q):st.getAll();req.onsuccess=e=>r(e.target.result||[])})}
function dbPut(s,d){return new Promise((r,j)=>{const q=tx(s,'readwrite').put(d);q.onsuccess=e=>r(e.target.result);q.onerror=j})}
function dbDel(s,id){return new Promise(r=>{tx(s,'readwrite').delete(id).onsuccess=()=>r()})}
async function cfg(k,def){const r=await dbGet('cfg',k);return r?r.val:def}
async function setCfg(k,v){await dbPut('cfg',{key:k,val:v})}

function dayDate(code){
  const idx=DAYS.indexOf(code),now=new Date(),dow=now.getDay()===0?6:now.getDay()-1;
  const dt=new Date(now);dt.setDate(dt.getDate()+(idx-dow));
  return dt.toISOString().split('T')[0];
}
function today(){return new Date().toISOString().split('T')[0]}
function fmtDate(d){return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})}
function greet(){const h=new Date().getHours();return h<12?'Morning':h<17?'Afternoon':'Evening'}
function raceCountdown(){const r=new Date('2025-10-19');const n=new Date();const d=Math.ceil((r-n)/864e5);return d>0?d:'Race Day!'}
function parsePace(p){if(!p)return 0;const[m,s]=(p||'0:00').split(':').map(Number);return m*60+(s||0)}
function fmtPace(s){if(!s)return '--:--';const m=Math.floor(s/60);return `${m}:${String(Math.floor(s%60)).padStart(2,'0')}`}

  // Pre-load 1RM PRs
  const prMap={};
  for(const k of split.ex){
    const hist=await getExerciseHistory(k);
    if(hist.length){const best=hist.reduce((b,h)=>h.oneRM>b.oneRM?h:b,hist[0]);if(best.oneRM>0)prMap[k]=best;}

  let html=`<div style="background:rgba(255,255,255,.03);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden">

    const cur=all.find(l=>l.date===date&&l.split===splitKey);

            <div class="ename">${ex.name}</div>

          </div>
          <div class="emuscles">${ex.muscles}</div>

            <span class="pill pill-g" style="background:rgba(74,222,128,.12);color:var(--green)">${ex.sets}×${ex.reps}</span>
            <span class="pill pm">${ex.rest}</span>

          </div>

      <div class="elog" id="elog-${k}">
        ${prev?`<div class="prevref">📋 Prev (${prev.date}): ${prev.sets.filter(s=>s.w).map(s=>`${s.w}kg×${s.r||'?'}`).join(' · ')}</div>`:'<div class="prevref">📋 First time — set your baseline!</div>'}
        ${sets.map((s,i)=>setRowHtml(k,i,s)).join('')}
        <button class="addset" onclick="addSet('${k}')">＋ Add Set</button>
      </div>

function reattachSetListeners(splitKey,date,allEx){
  const split=PPL_SPLITS[splitKey];if(!split)return;

function previewBadStats(){
  const dur=parseInt(document.getElementById('badDur')?.value)||0;
  const intensity=document.getElementById('badInt')?.value||'casual';
  if(!dur)return;
  const stats=calcBadmintonStats(dur,intensity);

  if(!el)return;
  el.style.display='block';
  el.innerHTML=`<div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">ESTIMATED STATS</div>

      <div>❤️ <strong style="color:var(--red)">${stats.hrZone}</strong></div>
      <div>🏸 ~<strong style="color:var(--yellow)">${stats.rallies}</strong> rallies</div>
    </div>`;
}

function calcBadmintonStats(dur,intensity){
  const tables={
    casual:   {calPerMin:7,  distPerMin:0.09,hrZone:'Zone 2–3',ralliesPerMin:14},
    competitive:{calPerMin:10,distPerMin:0.12,hrZone:'Zone 3–4',ralliesPerMin:18},
    tournament:{calPerMin:13,distPerMin:0.15,hrZone:'Zone 4–5',ralliesPerMin:22}
  };
  const t=tables[intensity]||tables.casual;
  return{
    calories:Math.round(dur*t.calPerMin),
    distance:(dur*t.distPerMin).toFixed(1),
    hrZone:t.hrZone,
    rallies:Math.round(dur*t.ralliesPerMin)
  };
}

async function saveBadminton(){
  const dur=parseInt(document.getElementById('badDur')?.value);

  const date=document.getElementById('badDate')?.value||today();
  const note=document.getElementById('badNote')?.value||'';
  const stats=calcBadmintonStats(dur,intensity);
  // Store in rLogs with type=Badminton so it appears in activity history
  await dbPut('rLogs',{
    date,dur,type:'Badminton',name:`Badminton · ${intensity}`,
    intensity,src:'manual',note,
    calories:stats.calories,dist:parseFloat(stats.distance),
    hrZone:stats.hrZone,rallies:stats.rallies
  });
  closeSheet();
  toast(`🏸 ${dur}min session saved!`,'ok');
}

async function syncStrava(){
  if(!ST.stravaUrl){toast('No backend URL set — check Settings','err');return}
  const dot=document.querySelector('.gdot');if(dot)dot.className='gdot spin';
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('Sync timed out')),15000));
    const r=await Promise.race([fetch(`${ST.stravaUrl}/activities?limit=30`),timeout]);
    if(r.status===401){
      if(dot)dot.className='gdot';
      toast('Strava not connected — tap Connect in Settings','err');return;
    }
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    let added=0;
    for(const a of(data.activities||[])){
      if(!a.date)continue;
      const existing=await dbAll('rLogs','date',a.date);
      const match=existing.find(e=>e.src==='strava'&&Math.abs((e.dist||0)-a.dist)<0.1);
      if(!match){
        await dbPut('rLogs',{date:a.date,dist:a.dist,pace:a.pace,dur:a.duration,
          type:a.type||'Run',name:a.name||'Strava Run',src:'strava',
          elevation:a.elevation,avgHR:a.avgHR,maxHR:a.maxHR,calories:a.calories});
        added++;
      }
    }
    if(dot)dot.className='gdot on';
    toast(`✓ Synced ${added} new run${added===1?'':'s'}`,'ok');
    ST.stravaOk=true;await setCfg('stravaConnected',true);
    if(ST.page==='run')setTimeout(()=>go('run'),700);
    if(ST.page==='dash')setTimeout(()=>go('dash'),700);
  }catch(e){
    if(dot)dot.className='gdot';
    toast('Sync failed: '+e.message,'err');
    console.error(e);
  }
}
async function syncGarmin(){syncStrava()}

async function getWeeklyVolumeData(n=8){
  const all=await dbAll('wLogs');
  const map={};
  for(const log of all){
    const w=weekLabel(log.date);
    if(!map[w])map[w]={sets:0,volume:0};
    for(const s of(log.sets||[])){
      if(s.done&&s.w&&s.r){map[w].sets++;map[w].volume+=parseFloat(s.w)*parseInt(s.r)}
    }
  }
  const keys=Object.keys(map).sort().slice(-n);
  return{labels:keys,sets:keys.map(k=>map[k].sets),volumes:keys.map(k=>Math.round(map[k].volume/1000*10)/10)};
}

async function getMuscleFrequency(){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-28);
  const recent=(await dbAll('wLogs')).filter(l=>new Date(l.date+'T00:00:00')>=cutoff);
  const freq={};
  for(const log of recent){
    for(const[m,exs] of Object.entries(MUSCLE_MAP)){
      if(exs.includes(log.ex))freq[m]=(freq[m]||0)+1;
    }
  }
  return freq;
}

async function renderProgress(el){
  const bwAll=(await dbAll('bwt')).sort((a,b)=>a.date.localeCompare(b.date));
  const targetWt=parseFloat(await cfg('targetWt','73'));

  const wlogs=await dbAll('wLogs');
  const prMap={};
  for(const log of wlogs){
    const valid=(log.sets||[]).filter(s=>s.w&&s.r);
    for(const s of valid){
      const rm=calc1RM(s.w,s.r);
      if(!prMap[log.ex]||rm>prMap[log.ex].oneRM){
        prMap[log.ex]={w:s.w,r:s.r,date:log.date,oneRM:rm};
      }
    }
  }

async function buildCoachContext(){
  // Body weight
  const bwAll=(await dbAll('bwt')).sort((a,b)=>a.date.localeCompare(b.date));
  const targetWt=await cfg('targetWt','73');
  const bwRecent=bwAll.slice(-5);
  const bwTrend=bwRecent.length>1?(bwRecent.at(-1).wt-bwRecent[0].wt).toFixed(1):null;

  // Strength PRs with 1RM
  const wlogs=await dbAll('wLogs');
  const prMap={};
  for(const log of wlogs){
    for(const s of(log.sets||[]).filter(s=>s.w&&s.r)){
      const rm=calc1RM(s.w,s.r);
      if(!prMap[log.ex]||rm>prMap[log.ex].oneRM)prMap[log.ex]={w:s.w,r:s.r,date:log.date,oneRM:rm,name:EXLIB[log.ex]?.name||log.ex};
    }
  }

  // Weekly volume (last 6 weeks)
  const volData=await getWeeklyVolumeData(6);
  const avgSets=volData.sets.length?Math.round(volData.sets.reduce((a,b)=>a+b,0)/volData.sets.length):0;
  const latestSets=volData.sets.at(-1)||0;
  const volTrend=volData.sets.length>2?(volData.sets.at(-1)-volData.sets.at(-3)):null;

  // Muscle frequency
  const muscleFreq=await getMuscleFrequency();
  const undertrained=Object.keys(MUSCLE_MAP).filter(m=>!muscleFreq[m]||muscleFreq[m]<2);
  const mostTrained=Object.entries(muscleFreq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([m,c])=>`${m}(${c}x)`);

  // Running
  const runs=(await dbAll('rLogs')).sort((a,b)=>b.date.localeCompare(a.date));
  const last4Runs=runs.slice(0,4);
  const wkKm=runs.filter(r=>(new Date()-new Date(r.date))/864e5<=7).reduce((a,r)=>a+(r.dist||0),0);
  const avgPaceSec=last4Runs.filter(r=>r.pace).reduce((a,r)=>a+parsePace(r.pace),0)/(last4Runs.filter(r=>r.pace).length||1);

  return{
    bodyWeight:{current:bwAll.at(-1)?.wt,target:targetWt,trend:bwTrend,entries:bwRecent.length},
    strengthPRs:Object.values(prMap).slice(0,8),
    weeklyVolume:{avgSets,latestSets,trend:volTrend,weeks:volData.labels.length},
    muscleBalance:{undertrained,mostTrained},
    running:{weeklyKm:Math.round(wkKm*10)/10,recentRuns:last4Runs.length,avgPace:avgPaceSec?fmtPace(avgPaceSec):null},
    raceCountdown:raceCountdown(),
    today:today()
  };
}

async function generateCoaching(){
  const btn=document.getElementById('coachGenBtn');
  const out=document.getElementById('coachOutput');
  if(!btn||!out)return;
  btn.disabled=true;btn.textContent='Analysing…';
  out.innerHTML=`<div class="coach-loading">
    <div style="font-size:14px;font-weight:600;color:var(--muted)">Coach is reviewing your data…</div>
    <div class="coach-dots">
      <div class="coach-dot"></div>
      <div class="coach-dot"></div>
      <div class="coach-dot"></div>
    </div>
  </div>`;

  const ctx=window._coachCtx;
  const prompt=`You are a professional fitness coach analysing a user's training data. Be specific, actionable, and encouraging. Use the exact numbers from their data.

USER DATA:
- Body weight: ${ctx.bodyWeight.current?ctx.bodyWeight.current+'kg (target: '+ctx.bodyWeight.target+'kg, trend: '+(ctx.bodyWeight.trend>0?'+':'')+ctx.bodyWeight.trend+'kg recent)':'not logged'}
- Race countdown: ${ctx.raceCountdown} days to half marathon
- Weekly running: ${ctx.running.weeklyKm}km this week, avg pace: ${ctx.running.avgPace||'not available'}
- Strength PRs: ${ctx.strengthPRs.map(p=>p.name+' '+p.w+'kg×'+p.r+' (est 1RM '+p.oneRM+'kg)').join(', ')||'none logged'}
- Weekly training volume: avg ${ctx.weeklyVolume.avgSets} sets/week, last week ${ctx.weeklyVolume.latestSets} sets
- Muscle coverage (last 28d): most trained: ${ctx.muscleBalance.mostTrained.join(', ')||'none'}, undertrained: ${ctx.muscleBalance.undertrained.join(', ')||'none'}

Respond ONLY with a JSON object (no markdown, no backticks) in this exact shape:
{
  "summary": "2-3 sentence honest overall assessment of where they are",
  "score": <number 1-10 for current training consistency>,
  "tips": [
    {"title": "short title", "detail": "specific actionable tip using their actual numbers"},
    {"title": "short title", "detail": "specific actionable tip"},
    {"title": "short title", "detail": "specific actionable tip"},
    {"title": "short title", "detail": "specific actionable tip"}
  ],
  "nextWeekFocus": [
    {"label": "Priority 1", "action": "specific action"},
    {"label": "Priority 2", "action": "specific action"},
    {"label": "Priority 3", "action": "specific action"},
    {"label": "Priority 4", "action": "specific action"}
  ],
  "watchOut": "one key risk or imbalance to watch based on their data"
}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!res.ok)throw new Error('API error '+res.status);
    const data=await res.json();
    const raw=data.content?.find(b=>b.type==='text')?.text||'{}';
    let report;
    try{report=JSON.parse(raw.replace(/```json|```/g,'').trim())}
    catch{throw new Error('Could not parse response')}
    renderCoachReport(report,out);
  }catch(e){
    out.innerHTML=`<div class="coach-warning" style="margin-top:12px"><span>⚠️</span><span>Could not generate report: ${e.message}. Make sure you're using the Claude.ai interface.</span></div>`;
    console.error(e);
  }finally{
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:18px;height:18px"><path d="M12 2a10 10 0 1 1 0 20A10 10 0 0 1 12 2z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> Regenerate Report';
  }
}

async function saveCfg(k,v){await setCfg(k,v);if(k==='stravaUrl'){ST.stravaUrl=v;ST.garminUrl=v}}

async function testStrava(){
  const url=(document.getElementById('cfgStrava')?.value||'').trim().replace(/\/+$/,'');
  if(!url){toast('Enter your backend URL first','err');return}
  const statusEl=document.getElementById('stravaStatus');
  statusEl.textContent='Testing connection…';
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout after 10s')),10000));
    const r=await Promise.race([fetch(`${url}/health`),timeout]);
    const data=await r.json();
    if(r.ok){
      ST.stravaUrl=url;ST.garminUrl=url;
      await setCfg('stravaUrl',url);
      if(data.stravaConnected){
        ST.stravaOk=true;ST.garmin=true;
        await setCfg('stravaConnected',true);
        const ath=data.athlete?.name||'';
        statusEl.innerHTML=`✅ Backend OK${ath?' · Strava: '+ath:''}`;
        toast('✅ Backend connected!','ok');
      } else {
        statusEl.innerHTML='✅ Backend OK · Now tap Connect Strava';
        toast('Backend reachable — tap Connect Strava','ok');
      }
    } else {
      throw new Error('HTTP '+r.status);
    }
  }catch(e){
    statusEl.innerHTML=`❌ ${e.message}`;
    toast('Connection failed: '+e.message,'err');
    console.error('testStrava:',e);
  }
}
function testGarmin(){testStrava()}

function openStravaAuth(){
  const raw=document.getElementById('cfgStrava')?.value||ST.stravaUrl||'';
  const url=raw.trim().replace(/\/+$/,'');
  if(!url){toast('Enter backend URL first','err');return}
  // Save URL before navigating away
  setCfg('stravaUrl',url);ST.stravaUrl=url;ST.garminUrl=url;
  // Use location.href instead of window.open — mobile Safari blocks popups
  // Strava will redirect back to FRONTEND_URL?strava=connected automatically
  window.location.href=`${url}/auth/strava`;
}
function openGarminAuth(){openStravaAuth()}

async function exportData(){
  const bwt=await dbAll('bwt');const wLogs=await dbAll('wLogs');const rLogs=await dbAll('rLogs');
  const data=JSON.stringify({exportDate:today(),bwt,wLogs,rLogs},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`fittrack-${today()}.json`;a.click();
  toast('Data exported!','ok');
}

function clearData(){
  if(!confirm('Delete ALL data? This cannot be undone.'))return;
  ['bwt','wLogs','rLogs'].forEach(s=>tx(s,'readwrite').clear());
  ST.exCache={};toast('All data cleared','ok');go('dash');
}

function installApp(){
  if(window.deferredPrompt){window.deferredPrompt.prompt();window.deferredPrompt=null}
  else toast('To install: tap Share → Add to Home Screen','ok');
}

function drawLineChart(id,vals,color,h,invertY=false){
  const c=document.getElementById(id);if(!c||vals.length<2)return;
  c.width=c.offsetWidth||320;c.height=h;
  const ctx=c.getContext('2d');const W=c.width,H=h,P={t:8,b:8,l:4,r:4};
  const mn=Math.min(...vals)-0.5,mx=Math.max(...vals)+0.5;
  const xS=i=>P.l+(i/(vals.length-1))*(W-P.l-P.r);
  const yS=v=>{const n=(v-mn)/(mx-mn);return P.t+(invertY?n:1-n)*(H-P.t-P.b)};
  ctx.clearRect(0,0,W,H);
  const gr=ctx.createLinearGradient(0,0,0,H);gr.addColorStop(0,color.replace(')',',0.15)').replace('rgb','rgba'));gr.addColorStop(1,'rgba(0,0,0,0)');
  if(color==='#4ade80'){gr.addColorStop(0,'rgba(74,222,128,0.15)');gr.addColorStop(1,'rgba(74,222,128,0)')}
  if(color==='#60a5fa'){gr.addColorStop(0,'rgba(96,165,250,0.15)');gr.addColorStop(1,'rgba(96,165,250,0)')}
  ctx.fillStyle=gr;ctx.beginPath();
  vals.forEach((v,i)=>i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v)));
  ctx.lineTo(xS(vals.length-1),H-P.b);ctx.lineTo(xS(0),H-P.b);ctx.closePath();ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';ctx.beginPath();
  vals.forEach((v,i)=>i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v)));ctx.stroke();
  ctx.fillStyle=color;vals.forEach((v,i)=>{ctx.beginPath();ctx.arc(xS(i),yS(v),3,0,Math.PI*2);ctx.fill()});
}

function drawBarChart(id,vals,labels,color,h){
  const c=document.getElementById(id);if(!c)return;
  c.width=c.offsetWidth||320;c.height=h;
  const ctx=c.getContext('2d');const W=c.width,H=h,P={t:6,b:22,l:4,r:4};
  const mx=Math.max(...vals)*1.1;
  const bw=Math.floor((W-P.l-P.r)/vals.length)-4;
  ctx.clearRect(0,0,W,H);
  vals.forEach((v,i)=>{
    const x=P.l+i*(W-P.l-P.r)/vals.length+2;const bh=(v/mx)*(H-P.t-P.b);const y=H-P.b-bh;
    ctx.fillStyle='rgba(96,165,250,0.15)';ctx.beginPath();ctx.roundRect(x,y,bw,bh,3);ctx.fill();
    ctx.fillStyle=color;ctx.globalAlpha=0.9;ctx.fillRect(x,y,bw,2);ctx.globalAlpha=1;
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='8px -apple-system,sans-serif';ctx.textAlign='center';
    ctx.fillText(labels[i]?.slice(-3)||'',x+bw/2,H-5);
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 9px -apple-system,sans-serif';ctx.fillText(v.toFixed(0),x+bw/2,y-3);
  });
}

function drawBWChart(id,vals,goalWt,h){
  const c=document.getElementById(id);if(!c||vals.length<2)return;
  c.width=c.offsetWidth||320;c.height=h;
  const ctx=c.getContext('2d');const W=c.width,H=h,P={t:10,b:10,l:4,r:4};
  const allVals=[...vals,goalWt];
  const mn=Math.min(...allVals)-1,mx=Math.max(...allVals)+1;
  const xS=i=>P.l+(i/(vals.length-1))*(W-P.l-P.r);
  const yS=v=>P.t+(1-(v-mn)/(mx-mn))*(H-P.t-P.b);
  ctx.clearRect(0,0,W,H);
  // Gradient fill
  const gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'rgba(74,222,128,0.18)');gr.addColorStop(1,'rgba(74,222,128,0)');
  ctx.fillStyle=gr;ctx.beginPath();
  vals.forEach((v,i)=>i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v)));
  ctx.lineTo(xS(vals.length-1),H-P.b);ctx.lineTo(xS(0),H-P.b);ctx.closePath();ctx.fill();
  // Goal line (dashed yellow)
  const gy=yS(goalWt);
  ctx.strokeStyle='rgba(251,191,36,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(P.l,gy);ctx.lineTo(W-P.r,gy);ctx.stroke();
  ctx.setLineDash([]);
  // Actual line
  ctx.strokeStyle='#4ade80';ctx.lineWidth=2.2;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();vals.forEach((v,i)=>i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v)));ctx.stroke();
  // Dots
  ctx.fillStyle='#4ade80';
  vals.forEach((v,i)=>{ctx.beginPath();ctx.arc(xS(i),yS(v),3,0,Math.PI*2);ctx.fill()});
  // Labels first/last
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 9px -apple-system,sans-serif';ctx.textAlign='left';
  ctx.fillText(vals[0]+'kg',P.l+4,yS(vals[0])-5);
  ctx.textAlign='right';
  ctx.fillText(vals.at(-1)+'kg',W-P.r-4,yS(vals.at(-1))-5);
}

function weekLabel(dateStr){
  const d=new Date(dateStr);const mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);
  return `${String(mon.getMonth()+1).padStart(2,'0')}/${String(mon.getDate()).padStart(2,'0')}`;
}

async function renderDiet(el){
  const planTypes=[
    {id:'run',label:'Run Day 🏃'},
    {id:'intervals',label:'Intervals ⚡'},
    {id:'long_run',label:'Long Run 🛣️'},
    {id:'strength',label:'Strength 💪'},
    {id:'rest',label:'Rest Day 🧘'}
  ];
  const tc=todayCode();
  let defaultPlan='rest';
  if(SCHEDULE[tc]?.type==='run'){
    const d=tc==='WED'?'intervals':tc==='SAT'?'long_run':'run';
    defaultPlan=d;
  } else if(SCHEDULE[tc]?.type==='strength'){defaultPlan='strength'}

  // Load today's logged meals
  const todayLogs=await dbAll('mealLogs','date',today());
  const loggedSet=new Set(todayLogs.map(l=>l.mealKey));

  // Load grocery checked state
  const grocData=await dbGet('groceries','checked');
  const checked=grocData?new Set(grocData.val):new Set();

  // Calculate today's consumed macros
  const plan=MEAL_PLANS[ST.dietPlan||defaultPlan];
  let consumed={kcal:0,p:0,c:0,f:0};
  plan.meals.forEach((m,mi)=>{
    m.items.forEach((item,ii)=>{
      const key=`${ST.dietPlan||defaultPlan}-${mi}-${ii}`;
      if(loggedSet.has(key)){consumed.kcal+=m.kcal;consumed.p+=item.p;consumed.c+=item.c;consumed.f+=item.f}
    });
  });
  const pct=Math.min(100,Math.round((consumed.kcal/plan.target.kcal)*100));

  el.innerHTML=`
  <div class="sh" style="margin-top:0"><div class="sh-title">Nutrition</div><button class="sh-btn" onclick="go('diet')" style="color:var(--muted);font-size:11px">Reset Logs</button></div>

  <!-- Day type selector -->
  <div class="meal-type-tabs">
    ${planTypes.map(p=>`<button class="mtt ${(ST.dietPlan||defaultPlan)===p.id?'active':''}" onclick="switchDietPlan('${p.id}')">${p.label}</button>`).join('')}
  </div>

  <!-- Calorie ring + macro bars -->
  <div class="card">
    <div class="calorie-ring-wrap">
      <div class="cring">
        <svg viewBox="0 0 88 88"><circle cx="44" cy="44" r="36" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="8"/><circle cx="44" cy="44" r="36" fill="none" stroke="var(--green)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${2*Math.PI*36}" stroke-dashoffset="${2*Math.PI*36*(1-pct/100)}" style="transition:stroke-dashoffset .5s ease"/></svg>
        <div class="cring-text"><div class="cring-num">${consumed.kcal}</div><div class="cring-sub">of ${plan.target.kcal} kcal</div></div>
      </div>
      <div class="cring-bars">
        <div class="cbar-row">
          <div class="cbar-lbl" style="color:var(--green)">Protein</div>
          <div class="cbar-track"><div class="cbar-fill" style="width:${Math.min(100,(consumed.p/plan.target.p)*100).toFixed(0)}%;background:var(--green)"></div></div>
          <div class="cbar-val" style="color:var(--green)">${consumed.p}/${plan.target.p}g</div>
        </div>
        <div class="cbar-row">
          <div class="cbar-lbl" style="color:var(--blue)">Carbs</div>
          <div class="cbar-track"><div class="cbar-fill" style="width:${Math.min(100,(consumed.c/plan.target.c)*100).toFixed(0)}%;background:var(--blue)"></div></div>
          <div class="cbar-val" style="color:var(--blue)">${consumed.c}/${plan.target.c}g</div>
        </div>
        <div class="cbar-row">
          <div class="cbar-lbl" style="color:var(--orange)">Fats</div>
          <div class="cbar-track"><div class="cbar-fill" style="width:${Math.min(100,(consumed.f/plan.target.f)*100).toFixed(0)}%;background:var(--orange)"></div></div>
          <div class="cbar-val" style="color:var(--orange)">${consumed.f}/${plan.target.f}g</div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:6px;padding:0 14px 12px">
      <div style="flex:1;text-align:center"><div style="font-size:18px;font-weight:800;color:var(--green)">${plan.target.kcal}</div><div style="font-size:10px;color:var(--muted)">TARGET kcal</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:18px;font-weight:800;color:var(--text)">${plan.target.kcal-consumed.kcal>0?plan.target.kcal-consumed.kcal:0}</div><div style="font-size:10px;color:var(--muted)">REMAINING</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:18px;font-weight:800;color:var(--yellow)">${pct}%</div><div style="font-size:10px;color:var(--muted)">COMPLETE</div></div>
    </div>
  </div>

  <!-- Meals -->
  <div class="sh"><div class="sh-title">${plan.tag} ${plan.label} Meals</div></div>
  ${plan.meals.map((m,mi)=>`
  <div class="meal-block">
    <div class="meal-block-hdr">
      <div class="meal-time-label">${m.time}</div>
      <div class="meal-kcal-badge">~${m.kcal} kcal</div>
    </div>
    ${m.items.map((item,ii)=>{
      const key=`${ST.dietPlan||defaultPlan}-${mi}-${ii}`;
      const isLogged=loggedSet.has(key);
      return`<div class="meal-item">
        <div class="meal-item-left">
          <div class="meal-item-name" style="${isLogged?'opacity:.5;text-decoration:line-through':''}">${item.name}</div>
          <div class="meal-item-desc">${item.desc}</div>
          <div class="meal-item-macros">
            <span class="macro-chip mc-p">P ${item.p}g</span>
            <span class="macro-chip mc-c">C ${item.c}g</span>
            <span class="macro-chip mc-f">F ${item.f}g</span>
          </div>
        </div>
        <button class="meal-log-btn ${isLogged?'logged':''}" onclick="toggleMeal('${key}','${ST.dietPlan||defaultPlan}',${mi},${ii})">${isLogged?'✓':'○'}</button>
      </div>`;
    }).join('')}
  </div>`).join('')}

  <!-- Grocery List -->
  <div class="sh" style="margin-top:8px">
    <div class="sh-title">🛒 Weekly Groceries</div>
    <button class="sh-btn" onclick="resetGroceries()">Reset</button>
  </div>
  <div style="font-size:12.5px;color:var(--muted);margin-bottom:12px;line-height:1.6">Based on your full weekly meal plan · Tap items to check off as you shop</div>
  ${GROCERY_LIST.map((cat,ci)=>`
  <div class="card groc-cat">
    <div class="meal-block-hdr">
      <div style="font-size:13px;font-weight:700">${cat.cat}</div>
      <div style="font-size:11px;color:var(--muted)">${cat.items.filter((_,i)=>checked.has(`g-${ci}-${i}`)).length}/${cat.items.length}</div>
    </div>
    ${cat.items.map((item,ii)=>{
      const gkey=`g-${ci}-${ii}`;
      const isChecked=checked.has(gkey);
      return`<div class="groc-item">
        <button class="groc-check ${isChecked?'checked':''}" onclick="toggleGrocery('${gkey}')">${isChecked?'✓':''}</button>
        <div class="groc-name ${isChecked?'checked':''}">${item.name}</div>
        <div class="groc-qty">${item.qty}</div>
      </div>`;
    }).join('')}
    <div class="groc-progress">
      <div class="groc-prog-bar"><div class="groc-prog-fill" style="width:${(cat.items.filter((_,i)=>checked.has(`g-${ci}-${i}`)).length/cat.items.length*100).toFixed(0)}%"></div></div>
      <div class="groc-prog-txt">${Math.round(cat.items.filter((_,i)=>checked.has(`g-${ci}-${i}`)).length/cat.items.length*100)}%</div>
    </div>
  </div>`).join('')}

  <!-- Hydration & Tips -->
  <div class="sh"><div class="sh-title">💧 Daily Targets</div></div>
  <div class="card cb" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div style="background:rgba(96,165,250,.08);border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--blue)">3.5L</div><div style="font-size:10.5px;color:var(--muted)">Water Target</div><div style="font-size:10px;color:var(--muted);margin-top:2px">+500ml per training hr</div></div>
    <div style="background:rgba(74,222,128,.08);border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--green)">160g</div><div style="font-size:10.5px;color:var(--muted)">Daily Protein</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Spread across 4–5 meals</div></div>
    <div style="background:rgba(251,191,36,.08);border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--yellow)">5</div><div style="font-size:10.5px;color:var(--muted)">Meals Per Day</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Never skip post-workout</div></div>
    <div style="background:rgba(251,146,60,.08);border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--orange)">−300</div><div style="font-size:10.5px;color:var(--muted)">Calorie Deficit</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Slow, sustainable cut</div></div>
  </div>`;
}

function switchDietPlan(id){ST.dietPlan=id;go('diet')}

async function toggleMeal(key,plan,mi,ii){
  const all=await dbAll('mealLogs','date',today());
  const exists=all.find(l=>l.mealKey===key);
  if(exists){await dbDel('mealLogs',exists.id)}
  else{await dbPut('mealLogs',{mealKey:key,plan,mi,ii,date:today()})}
  go('diet');
}

async function toggleGrocery(gkey){
  const data=await dbGet('groceries','checked');
  const checked=data?new Set(data.val):new Set();
  if(checked.has(gkey))checked.delete(gkey);else checked.add(gkey);
  await dbPut('groceries',{key:'checked',val:[...checked]});
  go('diet');
}

async function resetGroceries(){
  await dbPut('groceries',{key:'checked',val:[]});
  toast('Grocery list reset','ok');go('diet');
}


window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();window.deferredPrompt=e});
async function disconnectStrava(){
  if(!confirm('Disconnect Strava? Your synced runs will remain in the app.'))return;
  if(ST.stravaUrl){try{await fetch(`${ST.stravaUrl}/auth/disconnect`,{method:'POST'})}catch(e){}}
  ST.stravaOk=false;ST.garmin=false;
  await setCfg('stravaConnected',false);
  toast('Strava disconnected','ok');go('settings');
}

async function init(){
  document.getElementById('hDate').textContent=fmtDate(new Date());
  await initDB();
  ST.stravaUrl=await cfg('stravaUrl','');
  ST.garminUrl=ST.stravaUrl;
  ST.stravaOk=(await cfg('stravaConnected',false))&&!!ST.stravaUrl;
  ST.garmin=ST.stravaOk;
  // Detect return from Strava OAuth tab
  const params=new URLSearchParams(window.location.search);
  if(params.get('strava')==='connected'){
    ST.stravaOk=true;ST.garmin=true;
    await setCfg('stravaConnected',true);
    window.history.replaceState({},'',window.location.pathname);
    await go('settings');
    toast('✅ Strava connected! Tap Sync Now on the Running page.','ok');
    return;
  }
  await go('dash');
}
init();
</script>

<!-- PWA Manifest & Service Worker -->
<script>
if('serviceWorker' in navigator){
  const sw=`
self.addEventListener('install',e=>e.waitUntil(caches.open('fittrack-v1').then(c=>c.addAll(['./','./?pwa=1']))));
self.addEventListener('fetch',e=>{
  // Only intercept same-origin requests — never touch Railway, Strava, or Anthropic API calls
  if(e.request.url.startsWith(self.location.origin)){
    e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
  }
});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
const manifest={name:'FitTrack',short_name:'FitTrack',start_url:'./',display:'standalone',background_color:'#0d0f0f',theme_color:'#0d0f0f',icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%230d0f0f"/><text y=".9em" font-size="80">⚡</text></svg>',sizes:'any',type:'image/svg+xml'}]};
const mb=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(mb);document.head.appendChild(ml);
</script>
